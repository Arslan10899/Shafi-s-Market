{% extends "base.html" %}
{% block title %}Login - AZ Mart{% endblock %}
{% block content %}

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="fw-bold text-center mb-4"><i class="fas fa-sign-in-alt text-warning me-2"></i>Login</h3>

                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        <form method="POST" action="/auth/login">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Username</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-warning w-100 rounded-pill fw-semibold py-2">Login</button>
                        </form>

                        <p class="text-center mt-3 mb-0 small">
                            Don't have an account? <a href="/auth/register" class="text-decoration-none fw-semibold">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
